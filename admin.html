<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード | 10年日記</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo">📓 10年日記</a>
  <div id="nav-login" class="nav-links" style="display:none"></div>
  <div id="nav-user" class="nav-user" style="display:none">
    <span id="nav-nickname" class="nav-nickname"></span>
    <button class="btn-logout" onclick="handleLogout()">ログアウト</button>
  </div>
</header>

<div class="page-wrapper">

  <!-- 管理者ログインフォーム -->
  <div id="admin-login-form" class="form-card" style="max-width:400px;margin:3rem auto;">
    <div class="admin-header" style="border-radius:8px;margin-bottom:1.5rem;">
      <h1>⚙️ 管理者ダッシュボード</h1>
      <p style="font-size:0.85rem;margin-top:0.4rem;opacity:0.8;">管理者専用ページです</p>
    </div>
    <div class="form-group">
      <label>管理者パスワード</label>
      <div class="password-input-wrap">
        <input type="password" id="admin-pass" onkeydown="if(event.key==='Enter')adminLoginSubmit(event)">
        <button type="button" class="pw-toggle-btn" onclick="togglePasswordVisibility('admin-pass', this)">👁️</button>
      </div>
    </div>
    <div id="admin-login-error" class="auth-error"></div>
    <div class="form-footer">
      <button class="btn-primary" style="width:100%" onclick="adminLoginSubmit(event)">ログイン</button>
    </div>
    <div style="text-align:center;margin-top:1rem;">
      <a href="index.html" style="color:var(--amber);font-size:0.88rem;">← サイトに戻る</a>
    </div>
  </div>

  <!-- 管理パネル（ログイン後） -->
  <div id="admin-panel" style="display:none">
    <div class="admin-header">
      <h1>⚙️ 管理者ダッシュボード</h1>
      <p style="font-size:0.85rem;margin-top:0.3rem;opacity:0.8;">10年日記コミュニティ管理画面</p>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab-btn active" data-tab="members" onclick="adminTab('members')">👥 会員管理</button>
      <button class="admin-tab-btn" data-tab="diaries"  onclick="adminTab('diaries')">📖 日記管理</button>
      <button class="admin-tab-btn" data-tab="events"   onclick="adminTab('events')">🎪 イベント管理</button>
    </div>

    <!-- 会員管理 -->
    <div id="admin-members" class="admin-tab-content" style="display:block">
      <div class="loading-msg"><span class="loading-spinner"></span>読み込み中...</div>
    </div>

    <!-- 日記管理 -->
    <div id="admin-diaries" class="admin-tab-content">
      <div class="loading-msg"><span class="loading-spinner"></span>読み込み中...</div>
    </div>

    <!-- イベント管理（v3新規） -->
    <div id="admin-events" class="admin-tab-content">
      <div class="loading-msg"><span class="loading-spinner"></span>読み込み中...</div>
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
async function adminLoginSubmit(e) {
  if (e && e.preventDefault) e.preventDefault();
  const password = document.getElementById('admin-pass').value;
  const errEl    = document.getElementById('admin-login-error');
  errEl.classList.remove('show');
  try {
    const res = await Auth.post({ action: 'adminLogin', password });
    if (res.success) {
      Auth.setSession(res);
      document.getElementById('admin-login-form').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      updateNav();
      adminLoadMembers();
    } else {
      errEl.textContent = res.error || 'ログインに失敗しました';
      errEl.classList.add('show');
    }
  } catch(e) {
    errEl.textContent = '通信エラーが発生しました';
    errEl.classList.add('show');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  updateNav();
  if (Auth.isAdmin()) {
    document.getElementById('admin-login-form').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    adminLoadMembers();
  }
});
</script>
</body>
</html>
